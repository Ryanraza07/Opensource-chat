services:
  backend:
    build: ./MeetNow-backend
    ports:
      - "5000:5000"
    volumes:
      - ./MeetNow-backend:/usr/src/app
    depends_on:
      - mongo
    environment:
      - MONGO_URI=mongodb://mongo:27017/meetnow

  frontend:
    build: ./MeetNow-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./MeetNow-frontend:/usr/src/app
    stdin_open: true
    tty: true

  mongo:
    image: mongo:6
    ports:
      - "27018:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
